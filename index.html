<!DOCTYPE html>
<html lang="en">

<title>Murphy Door KY â Shop Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1020;--bg2:#111526;--panel:#181c2e;--panel-2:#1d2238;
  --line:rgba(255,255,255,.07);--blue:#1976d2;--blue-2:#1256a8;
  --text:#eef1f8;--muted:#7a84a8;--green:#3ec95c;--amber:#ffb300;
  --red:#ef5350;--cyan:#29d4ff;--teal:#2d3f47;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  overflow:hidden;display:flex;flex-direction:column;
}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);
  pointer-events:none;z-index:900;
}
/* HEADER */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1vh 2.5vw;
  background:linear-gradient(90deg,#0a2060 0%,#1256a8 30%,#1976d2 55%,#1256a8 75%,#0a2060 100%);
  background-size:300% 100%;animation:headerSlide 12s linear infinite;
  box-shadow:0 2px 24px rgba(0,0,0,.7),0 0 50px rgba(25,118,210,.12);
  flex:0 0 auto;position:relative;z-index:10;
}
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--cyan) 20%,#64b5f6 50%,var(--cyan) 80%,transparent 100%);
  background-size:300% 100%;animation:headerSlide 6s linear infinite;opacity:.8;
}
@keyframes headerSlide{0%{background-position:0% 0%}100%{background-position:300% 0%}}
/* Logo */
.brand{display:flex;align-items:center;gap:1.2vw}
.brand svg{height:3.6vh;width:auto;filter:drop-shadow(0 0 8px rgba(255,255,255,.2))}
.brand .loc{
  font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:2vh;
  letter-spacing:.2em;text-transform:uppercase;opacity:.8;
  border-left:1px solid rgba(255,255,255,.3);padding-left:1.2vw;margin-left:.2vw;
}
#panelTitle{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:2.9vh;
  letter-spacing:.14em;text-transform:uppercase;text-align:center;transition:opacity .25s;
}
#panelTitle.fade{opacity:0}
.clockbox{text-align:right;display:flex;align-items:center;gap:1.2vw}
#clock{font-family:'JetBrains Mono',monospace;font-size:3.1vh;font-weight:700;line-height:1}
#dateline{font-family:'JetBrains Mono',monospace;font-size:1.5vh;opacity:.8;margin-top:.4vh}
#liveDot{width:1.3vh;height:1.3vh;border-radius:50%;background:rgba(255,255,255,.2);flex:0 0 auto}
#liveDot.on{background:var(--green);animation:livePulse 2.4s ease-in-out infinite}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(62,201,92,.5)}60%{box-shadow:0 0 0 5px rgba(62,201,92,0)}}
/* STAGE */
main{
  flex:1 1 auto;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0%,rgba(25,118,210,.06) 0%,transparent 60%),var(--bg);
}
/* Panel photo backgrounds */
.panel{
  position:absolute;inset:0;padding:2.5vh 3vw;
  opacity:0;pointer-events:none;display:flex;flex-direction:column;gap:2vh;
}
.panel::before{
  content:'';position:absolute;inset:0;
  background-size:cover;background-position:center;
  opacity:0;transition:opacity .6s;pointer-events:none;z-index:-1;border-radius:0;
}
.panel.has-photo::before{opacity:.07}
.panel.active{
  opacity:1;pointer-events:auto;
  animation:panelIn .5s cubic-bezier(.22,.68,0,1.15) forwards;
}
.panel.exiting{animation:panelOut .35s ease-in forwards;pointer-events:none;}
@keyframes panelIn{from{opacity:0;transform:translateX(3.5vw)}to{opacity:1;transform:translateX(0)}}
@keyframes panelOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-3vw)}}
.panel h2{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:2.3vh;
  letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:.8vw;
}
.panel h2::before{
  content:'';display:block;width:.7vh;height:.7vh;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 8px var(--cyan);flex:0 0 auto;
}
/* Panel watermark logo */
.panel-logo{
  position:absolute;bottom:1.5vh;right:2vw;opacity:.06;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:4vh;
  letter-spacing:.12em;text-transform:uppercase;pointer-events:none;
  white-space:nowrap;
}
/* Daily Numbers */
.rev-card{
  background:linear-gradient(145deg,var(--panel) 0%,var(--panel-2) 100%);
  border:1px solid rgba(25,118,210,.18);border-radius:18px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1.8vh;
  padding:3vh 2vw;flex:1;position:relative;overflow:hidden;
}
.rev-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% -10%,rgba(25,118,210,.1) 0%,transparent 65%);
  pointer-events:none;
}
.rev-label{font-family:'Barlow Condensed',sans-serif;font-size:2.8vh;font-weight:600;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
.rev-value{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20vh;line-height:.93;letter-spacing:.01em;transition:color .6s,text-shadow .6s}
.rev-value.on{color:var(--green);text-shadow:0 0 60px rgba(62,201,92,.3)}
.rev-doors{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:5.5vh;color:#64b5f6}
.rev-doors small{font-size:2.7vh;color:var(--muted);font-weight:600;letter-spacing:.12em;text-transform:uppercase}
.rev-status{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:3.1vh;
  letter-spacing:.15em;text-transform:uppercase;padding:.vh 2.5vw;border-radius:999px;transition:all .4s;
}
.status-on{background:rgba(62,201,92,.13);color:var(--green);border:1px solid rgba(62,201,92,.4);box-shadow:0 0 18px rgba(62,201,92,.12)}
.status-behind{background:rgba(239,83,80,.11);color:var(--red);border:1px solid rgba(239,83,80,.38)}
/* Tables */
table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:14px;overflow:hidden;border:1px solid var(--line)}
th{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.9vh;
  letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
  text-align:left;padding:1.3vh 1.4vw;border-bottom:1px solid var(--line);
  background:linear-gradient(90deg,var(--panel-2),rgba(29,34,56,.5));
}
td{padding:1.4vh 1.4vw;font-size:2.2vh;border-bottom:1px solid var(--line);font-weight:500}
tr:nth-child(even) td{background:rgba(255,255,255,.018)}
tr:last-child td{border-bottom:none}
td.order{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:2.3vh}
.more-note{font-family:'Barlow Condensed',sans-serif;font-size:2.1vh;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:.8vh}
.badge{display:inline-block;padding:.4vh .9vw;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.9vh;letter-spacing:.1em;text-transform:uppercase}
.b-rush{background:rgba(255,179,0,.13);color:var(--amber);border:1px solid rgba(255,179,0,.38);animation:rushGlow 2.2s ease-in-out infinite}
@keyframes rushGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,179,0,.25)}55%{box-shadow:0 0 10px rgba(255,179,0,.45)}}
.b-over{background:rgba(239,83,80,.13);color:var(--red);border:1px solid rgba(239,83,80,.38)}
.b-today{background:rgba(25,118,210,.16);color:#64b5f6;border:1px solid rgba(100,181,246,.38)}
.b-prog{background:rgba(122,132,168,.11);color:var(--muted);border:1px solid rgba(122,132,168,.3)}
/* Cycle Times */
.ct-subtitle{font-family:'Barlow Condensed',sans-serif;font-size:2vh;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:-.5vh}
.ct-grid{display:flex;flex-direction:column;gap:2vh;flex:1;justify-content:center}
.ct-row{display:flex;align-items:center;gap:1.5vw}
.ct-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:2.4vh;letter-spacing:.07em;text-transform:uppercase;width:19vw;flex:0 0 19vw;text-align:right}
.ct-bar-bg{flex:1;height:4.2vh;background:rgba(255,255,255,.04);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.ct-bar-fill{height:100%;border-radius:8px;width:0%;transition:width 1.4s cubic-bezier(.22,.68,0,1.18);position:relative}
.ct-bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(255,255,255,.18),transparent);border-radius:8px 8px 0 0}
.ct-fast{background:linear-gradient(90deg,#1e6b30,var(--green))}
.ct-med{background:linear-gradient(90deg,#7a5700,var(--amber))}
.ct-slow{background:linear-gradient(90deg,#7a1f1f,var(--red))}
.ct-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:2.3vh;width:10vw;flex:0 0 10vw}
.ct-fast-text{color:var(--green)}.ct-med-text{color:var(--amber)}.ct-slow-text{color:var(--red)}
.ct-sample{font-family:'JetBrains Mono',monospace;font-size:1.7vh;color:var(--muted);width:8vw;flex:0 0 8vw}
/* Footer */
footer{flex:0 0 auto;background:#080b16;border-top:1px solid rgba(25,118,210,.15)}
#rotbar{height:.9vh;background:rgba(255,255,255,.04);position:relative;overflow:hidden}
#rotbar>span{
  display:block;height:100%;width:0%;
  background:linear-gradient(90deg,var(--blue-2),var(--cyan),#64b5f6,var(--cyan),var(--blue));
  background-size:300% 100%;animation:barShimmer 2s linear iinfinite;
  box-shadow:0 0 10px rgba(41,212,255,.5);
}
@keyframes barShimmer{0%{background-position:0%}100%{background-position:300%}}
.ticker-wrap{overflow:hidden;white-space:nowrap;padding:1.1vh 0}
.ticker{
  display:inline-block;padding-left:100%;
  font-family:'JetBrains Mono',monospace;font-weight:500;font-size:2.1vh;color:#636d8a;
  animation:scroll 55s linear infinite;
}
.ticker b{color:var(--amber);font-weight:700}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
@media(prefers-reduced-motion:reduce){
  .ticker,.panel,#liveDot.on,.b-rush,#rotbar>span{animation:none}
  header,header::after{animation:none;background-position:0%}
}
</style>

/* ===== HELPERS ===== */
const fmt$ = n => "$" + Math.round(n).toLocaleString();
const num  = s => parseFloat(String(s).replace(/["$,\s]/g,""))||0;
const hasFeed = k => { const u=CONFIG.live.feeds[k]; return u&&!u.includes("PASTE"); };

function parseCSV(text){
  const rows=[]; let row=[],field="",inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}else field+=c;}
    else{
      if(c==='"')inQ=true;
      else if(c===','){row.push(field);field="";}
      else if(c==='\n'||c==='\r'){if(field!==''||row.length){row.push(field);rows.push(row);row=[];field='';}}
      else field+=c;
    }
  }
  if(field!==''||row.length){row.push(field);rows.push(row);}
  return rows;
}
async function fetchCSV(url){
  const bust=url+(url.includes("?")?"&":"?")+"t="+Date.now();
  const res=await fetch(bust,{cache:"no-store"});
  if(!res.ok) throw new Error("HTTP "+res.status);
  return parseCSV((await res.text()).trim());
}

/* ===== PANELS ===== */
function badge(s){
  if(s==="rush")    return '<span class="badge b-rush">Rush</span>';
  if(s==="overdue") return '<span class="badge b-over">Overdue</span>';
  if(s==="today")   return '<span class="badge b-today">Due Today</span>';
  return '<span class="badge b-prog">In Progress</span>';
}
function watermark(label){ return `<div class="panel-logo">Murphy Door &nbsp;${label}</div>`; }

function numbersPanel(){
  const t=CONFIG.today;
  const rpe=CONFIG.live.headcount>0?t.revenue/CONFIG.live.headcount:0;
  const met=rpe>=CONFIG.live.rpeGoal;

}

    ?`${h.toFixed(1)}<span style="font-size:.75em;opacity:.7"> hrs</span>`
    :`${(h/24).toFixed(1)}<span style="font-size:.75em;opacity:.7"> days</span>`;
  const rows=CONFIG.cycleTimes.map(d=>`
    <div class="ct-row">
      <div class="ct-label">${d.dept}</div>
      <div class="ct-bar-bg"><div class="ct-bar-fill ${cc(d.avgHours)}" style="width:${(d.avgHours/max*100).toFixed(1)}%"></div></div>
      <div class="ct-val ${tc(d.avgHours)}">${fmtH(d.avgHours)}</div>
      <div class="ct-sample">${d.samples} orders</div>
    </div>`).join('');
  return `
    <h2>Avg Cycle Time by Department</h2>
    <div class="ct-subtitle">5-day rolling avg &nbsp;â¢&nbsp; last MonâFri</div>
    <div class="ct-grid">${rows}</div>${watermark('Production')}`;
}

function prioritiesPanel(){
  const rows=CONFIG.priorities.map(p=>`<tr>
    <td class="order">${p.order}</td><td>${p.customer}</td><td>${p.dept}</td><td>${badge(p.status)}</td>
  </tr>`).join("");
  return `
    <h2>Build these first</h2>
    <table>
      <thead><tr><th>Order #</th><th>Customer</th><th>Department</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>${watermark('Priorities')}`;
}

function paintPanel(){
  const MAX=8;
  const shown=CONFIG.paint.slice(0,MAX);
  const rows=shown.map((p,i)=>`<tr>
    <td class="order" style="color:#64b5f6">${i+1}</td>
    <td class="order">${p.order}</td><td>${p.customer}</td><td>${p.finish}</td><td>${p.due}</td>
    <td>${p.status?badge(p.status):''}</td>
  </tr>`).join("");
  const more=CONFIG.paint.length>MAX?`<div class="more-note">+ ${CONFIG.paint.length-MAX} more in queue</div>`:"";
  return `
    <h2>Paint / Stain â today's order of attack</h2>
    <table>
      <thead><tr><th style="width:4vw">#</th><th>Order #</th><th>Customer</th><th>Finish</th><th>Due</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>${more}${watermark('Paint')}`;
}

function buildingPanel(){
  const MAX=8;
  const shown=CONFIG.building.slice(0,MAX);
  const rows=shown.map((p,i)=>`<tr>
    <td class="order" style="color:#64b5f6">${i+1}</td>
    <td class="order">${p.order}</td><td>${p.customer}</td><td>${p.dept}</td>
    <td>${p.doors}</td><td>${p.due}</td>
    <td>${p.status?badge(p.status):''}</td>
  </tr>`).join("");
  const more=CONFIG.building.length>MAX?`<div class="more-note">+ ${CONFIG.building.length-MAX} more in queue</div>`:"";
  return `
    <h2>Sanding / Assembly â today's order of attack</h2>
    <table>
      <thead><tr><th style="width:4vw">#</th><th>Order #</th><th>Customer</th><th>Dept</th><th>Doors</th><th>Due</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>${more}${watermark('Build')}`;
}

function warrantyPanel(){
  const rows=CONFIG.warranties.map(w=>`<tr>
    <td class="order">${w.order}</td><td>${w.issue}</td><td>${w.dept}</td><td>${badge(w.status)}</td>
  </tr>`).join("");
  return `
    <h2>Active KY warranties â keep these moving</h2>
    <table>
      <thead><tr><th>Order #</th><th>Issue</th><th>Department</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>${watermark('Warranty')}`;
}

const PANELS = [
  {id:"numbers",   title:"Daily Numbers",      render:numbersPanel,    available:()=>true},
  {id:"cycletime", title:"Cycle Times",        render:cycleTimesPanel, available:()=>CONFIG.cycleTimes.length>0},
  {id:"priority",  title:"Top Priorities",     render:prioritiesPanel, available:()=>CONFIG.priorities.length>0},
  {id:"building",  title:"Sanding / Assembly", render:buildingPanel,   available:()=>CONFIG.building.length>0},
  {id:"paint",     title:"Paint Priorities",   render:paintPanel,      available:()=>CONFIG.paint.length>0},
  {id:"warranty",  title:"Warranties",         render:warrantyPanel,   available:()=>CONFIG.warranties.length>0}
];

/* Build panel DOM */
const stage=document.getElementById("stage");
PANELS.forEach(p=>{
  const el=document.createElement("section");
  el.className="panel"; el.id="panel-"+p.id;
  if(CONFIG.photos[p.id]){
    el.classList.add("has-photo");
    el.style.setProperty('--photo',`url(${CONFIG.photos[p.id]})`);
  }
  el.innerHTML=p.render();
  stage.appendChild(el);
});

/* Apply CSS photo backgrounds */
PANELS.forEach(p=>{
  const el=document.getElementById("panel-"+p.id);
  if(CONFIG.photos[p.id]) el.style.cssText+=`;--photo:url(${CONFIG.photos[p.id]})`;
});
/* Inject dynamic ::before via style tag */
(()=>{
  const s=document.createElement('style');
  s.textContent='.has-photo::before{background-image:var(--photo)!important}';
  document.head.appendChild(s);
})();

/* Rotation */
let current="numbers";
const rotFill=document.querySelector("#rotbar > span");

function animateCycleBars(el){
  el.querySelectorAll('.ct-bar-fill').forEach(b=>{
    const t=b.style.width; b.style.width='0%';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ b.style.width=t; }));
  });
}

function showPanel(id){
  const old=stage.querySelector('.panel.active');
  if(old&&old.id!=='panel-'+id){
    old.classList.remove('active'); old.classList.add('exiting');
    setTimeout(()=>old.classList.remove('exiting'),400);
  }
  current=id;
  const p=PANELS.find(x=>x.id===id);
  const el=document.getElementById('panel-'+id);
  el.classList.add('active');
  if(id==='cycletime') animateCycleBars(el);
  const titleEl=document.getElementById('panelTitle');
  titleEl.classList.add('fade');
  setTimeout(()=>{ titleEl.textContent=p.title; titleEl.classList.remove('fade'); },250);
  rotFill.style.transition='none'; rotFill.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    rotFill.style.transition=`width ${CONFIG.panelSeconds}s linear`;
    rotFill.style.width='100%';
  }));
}

function nextPanel(){
  const avail=PANELS.filter(p=>p.available());
  if(!avail.length) return;
  const i=avail.findIndex(p=>p.id===current);
  showPanel(avail[(i+1)%avail.length].id);
}

showPanel("numbers");
setInterval(nextPanel,CONFIG.panelSeconds*1000);

/* Live feed polling */
async function pollLive(){
  let anyOk=false;
  if(hasFeed("numbers")){
    try{
      const rows=await fetchCSV(CONFIG.live.feeds.numbers);
      let last=null;
      for(const r of rows.slice(1)){ if(r.length>=3&&String(r[1]).trim()!=="") last=r; }
      if(last){ CONFIG.today.doorsShipped=num(last[1]); CONFIG.today.revenue=num(last[2]); anyOk=true; }
    }catch(e){ console.warn("feed:",e); }
  }
  PANELS.forEach(p=>{ document.getElementById("panel-"+p.id).innerHTML=p.render(); });
  const cur=PANELS.find(p=>p.id===current);
  if(cur&&!cur.available()) nextPanel();
  document.getElementById("liveDot").classList.toggle("on",anyOk);
}
pollLive();
setInterval(pollLive,CONFIG.live.pollMinutes*60*1000);

document.getElementById("ticker").innerHTML=
  CONFIG.ticker.map(t=>"&nbsp;&nbsp;&nbsp;â¢&nbsp;&nbsp;&nbsp;"+t).join("");

async function keepAwake(){
  if(!("wakeLock" in navigator)) return;
  const grab=async()=>{ try{ await navigator.wakeLock.request("screen"); }catch(e){} };
  await grab();
  document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible") grab(); });
}
keepAwake();

function tick(){
  const now=new Date();
  document.getElementById("clock").textContent=now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  document.getElementById("dateline").textContent=now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
}
tick(); setInterval(tick,1000);
</script>
</body>
</html>
