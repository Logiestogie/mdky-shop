<style>
  :root{
    --bg:#14172a; --bg2:#1a1d2e; --panel:#1e2130; --panel-2:#232740;
    --line:rgba(255,255,255,.08); --blue:#1976d2; --blue-2:#1565c0;
    --text:#eef1f8; --muted:#8e96b3; --green:#43c463; --amber:#ffb300;
    --red:#ef5350; --red-dark:#c62828;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 100%);
    color:var(--text); font-family:'Inter',sans-serif; overflow:hidden;
    display:flex;flex-direction:column;
  }

  /* ===== HEADER ===== */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:1.2vh 2.5vw;
    background:linear-gradient(90deg,var(--blue-2),var(--blue));
    box-shadow:0 2px 14px rgba(0,0,0,.45); flex:0 0 auto;
  }
  .brand{display:flex;align-items:baseline;gap:1vw}
  .brand .name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:3.4vh;letter-spacing:.06em;text-transform:uppercase}
  .brand .loc{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:2.2vh;letter-spacing:.18em;text-transform:uppercase;opacity:.85}
  #panelTitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:3vh;letter-spacing:.12em;text-transform:uppercase;text-align:center}
  .clockbox{text-align:right;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:1vw}
  #clock{font-size:3.2vh;font-weight:700;line-height:1}
  #dateline{font-size:1.7vh;opacity:.85;margin-top:.4vh}
  #liveDot{
    width:1.4vh;height:1.4vh;border-radius:50%;background:rgba(255,255,255,.25);
    flex:0 0 auto;
  }
  #liveDot.on{background:var(--green);box-shadow:0 0 1.2vh rgba(67,196,99,.8)}

  /* ===== STAGE ===== */
  main{flex:1 1 auto;position:relative;overflow:hidden}
  .panel{
    position:absolute;inset:0;padding:3vh 3vw;
    opacity:0;transform:translateY(1.5vh);
    transition:opacity .6s ease,transform .6s ease;
    pointer-events:none;display:flex;flex-direction:column;gap:2.2vh;
  }
  .panel.active{opacity:1;transform:none;pointer-events:auto}
  .panel h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:2.6vh;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}

  /* ---- Daily Numbers ---- */
  .rev-card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1.6vh;
    padding:3vh 2vw;
  }
  .rev-label{font-family:'Barlow Condensed',sans-serif;font-size:3vh;font-weight:600;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
  .rev-value{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22vh;line-height:.95;letter-spacing:.01em}
  .rev-doors{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:6vh;color:#64b5f6}
  .rev-doors small{font-size:3vh;color:var(--muted);font-weight:600;letter-spacing:.12em;text-transform:uppercase}
  .rev-status{
    font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:3.4vh;
    letter-spacing:.14em;text-transform:uppercase;padding:.8vh 2vw;border-radius:999px;
  }
  .status-on{background:rgba(67,196,99,.15);color:var(--green);border:1px solid rgba(67,196,99,.4)}
  .status-behind{background:rgba(239,83,80,.12);color:var(--red);border:1px solid rgba(239,83,80,.4)}

  /* ---- Tables ---- */
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:14px;overflow:hidden;border:1px solid var(--line)}
  th{
    font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:2.2vh;
    letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    text-align:left;padding:1.6vh 1.4vw;border-bottom:1px solid var(--line);background:var(--panel-2);
  }
  td{padding:1.7vh 1.4vw;font-size:2.5vh;border-bottom:1px solid var(--line);font-weight:500}
  tr:last-child td{border-bottom:none}
  td.order{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:2.6vh}
  .more-note{font-family:'Barlow Condensed',sans-serif;font-size:2.4vh;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .badge{
    display:inline-block;padding:.5vh 1vw;border-radius:8px;
    font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:2.1vh;letter-spacing:.1em;text-transform:uppercase;
  }
  .b-rush{background:rgba(255,179,0,.16);color:var(--amber);border:1px solid rgba(255,179,0,.45)}
  .b-over{background:rgba(239,83,80,.14);color:var(--red);border:1px solid rgba(239,83,80,.45)}
  .b-today{background:rgba(25,118,210,.18);color:#64b5f6;border:1px solid rgba(100,181,246,.45)}
  .b-prog{background:rgba(142,150,179,.14);color:var(--muted);border:1px solid rgba(142,150,179,.4)}

  /* ===== TICKER + ROTATION BAR ===== */
  footer{flex:0 0 auto;background:#101325;border-top:1px solid var(--line)}
  #rotbar{height:.6vh;background:var(--panel-2)}
  #rotbar > span{display:block;height:100%;width:0;background:var(--blue)}
  .ticker-wrap{overflow:hidden;white-space:nowrap;padding:1.4vh 0}
  .ticker{
    display:inline-block;padding-left:100%;
    font-family:'JetBrains Mono',monospace;font-weight:500;font-size:2.4vh;color:#aeb6d4;
    animation:scroll 45s linear infinite;
  }
  .ticker b{color:var(--amber);font-weight:700}
  @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
  @media (prefers-reduced-motion: reduce){
    .ticker{animation:none;padding-left:2vw}
    .panel{transition:none}
  }
</style>

/* =================== HELPERS =================== */
const fmt$ = n => "$" + Math.round(n).toLocaleString();
const hasFeed = key => {
  const u = CONFIG.live.feeds[key];
  return u && !u.includes("PASTE");
};
/* Minimal CSV parser that handles quoted fields with commas */
function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQ = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i];
    if(inQ){
      if(c === '"'){ if(text[i+1] === '"'){ field += '"'; i++; } else inQ = false; }
      else field += c;
    }else{
      if(c === '"') inQ = true;
      else if(c === ","){ row.push(field); field = ""; }
      else if(c === "\n" || c === "\r"){
        if(field !== "" || row.length){ row.push(field); rows.push(row); row = []; field = ""; }
      }
      else field += c;
    }
  }
  if(field !== "" || row.length){ row.push(field); rows.push(row); }
  return rows;
}
/* =================== PANELS =================== */

  const t = CONFIG.today;
  const rpe = CONFIG.live.headcount > 0 ? t.revenue / CONFIG.live.headcount : 0;

}

}

/* Panels skip themselves when their feed isn't connected or has no rows */
const PANELS = [
  { id:"numbers",  title:"Daily Numbers",    render:numbersPanel,    available:()=>true },

  { id:"warranty", title:"Warranties",       render:warrantyPanel,   available:()=>CONFIG.warranties.length>0 }

/* Build panel containers */
const stage = document.getElementById("stage");
PANELS.forEach(p=>{
  const el = document.createElement("section");
  el.className = "panel";
  el.id = "panel-" + p.id;
  el.innerHTML = p.render();
  stage.appendChild(el);
});

/* Rotation across available panels only */
let current = "numbers";
const rotFill = document.querySelector("#rotbar > span");
function showPanel(id){
  current = id;
  const p = PANELS.find(x=>x.id===id);
  document.querySelectorAll(".panel").forEach(el=>el.classList.remove("active"));
  document.getElementById("panel-"+id).classList.add("active");
  document.getElementById("panelTitle").textContent = p.title;
  rotFill.style.transition = "none";
  rotFill.style.width = "0%";
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    rotFill.style.transition = `width ${CONFIG.panelSeconds}s linear`;
    rotFill.style.width = "100%";
  });});
}
function nextPanel(){
  const avail = PANELS.filter(p=>p.available());
  if(!avail.length) return;
  const i = avail.findIndex(p=>p.id===current);
  showPanel(avail[(i+1) % avail.length].id);
}
showPanel("numbers");
setInterval(nextPanel, CONFIG.panelSeconds*1000);

/* =================== LIVE FEED POLLING =================== */
async function fetchCSV(url){
  const bust = url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();
  const res = await fetch(bust, { cache:"no-store" });
  if(!res.ok) throw new Error("HTTP " + res.status);
  return parseCSV((await res.text()).trim());
}
const num = s => parseFloat(String(s).replace(/["$,\s]/g,"")) || 0;

async function pollLive(){
  let anyOk = false;

  if(hasFeed("numbers")){
    try{
      const rows = await fetchCSV(CONFIG.live.feeds.numbers);
      let last = null;
      for(const r of rows.slice(1)){ if(r.length>=3 && String(r[1]).trim()!=="") last = r; }
      if(last){
        CONFIG.today.doorsShipped = num(last[1]);
        CONFIG.today.revenue = num(last[2]);
        anyOk = true;
      }
    }catch(e){ console.warn("numbers feed:", e); }
  }

  /* Re-render all panels with fresh data */
  PANELS.forEach(p=>{ document.getElementById("panel-"+p.id).innerHTML = p.render(); });
  /* If the current panel just became unavailable, advance */
  const cur = PANELS.find(p=>p.id===current);
  if(cur && !cur.available()) nextPanel();
  document.getElementById("liveDot").classList.toggle("on", anyOk);
}
pollLive();
setInterval(pollLive, CONFIG.live.pollMinutes * 60 * 1000);

/* Ticker */
document.getElementById("ticker").innerHTML =
  CONFIG.ticker.map(t=>"&nbsp;&nbsp;&nbsp;â¢&nbsp;&nbsp;&nbsp;"+t).join("");

/* Keep the screen awake â the page itself asks the device not to sleep.
   Works in Chromium-based browsers (incl. Silk). Re-acquires on tab focus
   and survives the 10-min page reload since it runs on every load. */
async function keepAwake(){
  if(!("wakeLock" in navigator)) return;
  const grab = async () => {
    try{ await navigator.wakeLock.request("screen"); }
    catch(e){ console.warn("wakeLock:", e); }
  };
  await grab();
  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "visible") grab();
  });
}
keepAwake();

/* Clock */
function tick(){
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  document.getElementById("dateline").textContent =
    now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
}
tick(); setInterval(tick,1000);
